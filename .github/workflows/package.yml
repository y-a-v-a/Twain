name: Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for this build (e.g. 1.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build & package Twain.app
    runs-on: macos-15
    env:
      # Tag push: derive from the tag (v1.4 -> 1.4); manual run: use the input.
      VERSION: ${{ inputs.version || '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Derive version from tag
        if: github.ref_type == 'tag'
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Stamp version into Info.plist
        run: |
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleShortVersionString $VERSION" \
            -c "Set :CFBundleVersion $VERSION" \
            Info.plist

      - name: Build release app bundle
        run: ./build.sh --release

      # ditto preserves executable bits and bundle structure; uploading the bare
      # .app would strip permissions (actions/upload-artifact limitation).
      # --norsrc/--noextattr keep AppleDouble (._*) entries out of the zip: Info-ZIP
      # unzip extracts those as literal files inside the bundle, breaking its seal.
      - name: Zip app bundle
        run: ditto -c -k --norsrc --noextattr --noqtn --keepParent .build/release/Twain.app "Twain-$VERSION.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Twain-${{ env.VERSION }}
          path: Twain-*.zip
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: Twain-*.zip
          generate_release_notes: true
