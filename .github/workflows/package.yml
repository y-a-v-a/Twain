name: Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for this build (e.g. 1.4)'
        required: true
        type: string
  # Temporary trigger to test this workflow before merge — removed before PR review.
  push:
    branches: [package-workflow]

jobs:
  package:
    name: Build & package Twain.app
    runs-on: macos-15
    env:
      VERSION: ${{ inputs.version || '0.0.0-test' }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version into Info.plist
        run: |
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleShortVersionString $VERSION" \
            -c "Set :CFBundleVersion $VERSION" \
            Info.plist

      - name: Build release app bundle
        run: ./build.sh --release

      # ditto preserves executable bits and bundle structure; uploading the bare
      # .app would strip permissions (actions/upload-artifact limitation).
      # --norsrc/--noextattr keep AppleDouble (._*) entries out of the zip: Info-ZIP
      # unzip extracts those as literal files inside the bundle, breaking its seal.
      - name: Zip app bundle
        run: ditto -c -k --norsrc --noextattr --noqtn --keepParent .build/release/Twain.app "Twain-$VERSION.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Twain-${{ inputs.version || '0.0.0-test' }}
          path: Twain-*.zip
          if-no-files-found: error
